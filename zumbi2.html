<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sobrevivência Zumbi - Alex Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Courier New', monospace; color: white; user-select: none; touch-action: none; }
        #gameCanvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 10; }
        #scoreDisplay { font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #healthBarContainer { width: 200px; height: 20px; background-color: #333; border: 2px solid #000; margin-top: 10px; }
        #healthBar { width: 100%; height: 100%; background-color: #ff3333; transition: width 0.1s linear; }
        
        .overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background-color: rgba(0, 0, 0, 0.9); padding: 40px; border-radius: 10px; 
            text-align: center; display: none; z-index: 20; width: 80%;
        }
        #gameOverScreen { border: 4px solid #ff3333; }
        #victoryScreen { border: 4px solid #f1c40f; color: #f1c40f; }

        /* Botão de Atirar Mobile */
        #shootBtn {
            position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px;
            background: rgba(255, 51, 51, 0.6); border: 5px solid #ff3333;
            border-radius: 50%; z-index: 15; color: white; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        #bossWarning {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
            color: #ff3333; font-size: 30px; font-weight: bold; text-shadow: 3px 3px 0 #000;
            display: none; z-index: 15; animation: blink 1s infinite; text-align: center;
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        button { background-color: #ff3333; color: white; border: none; padding: 15px 30px; font-size: 20px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .credits { color: white; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="scoreDisplay">Pontos: <span>0</span></div>
        <div id="healthBarContainer"><div id="healthBar"></div></div>
    </div>

    <div id="bossWarning">AVISO: ENTIDADE GIGANTE APROXIMANDO-SE!</div>

    <!-- Botão visível para facilitar no Mobile -->
    <div id="shootBtn">ATIRAR</div>

    <div id="gameOverScreen" class="overlay">
        <h1>VOCÊ CAIU</h1>
        <h2 id="finalScore">Score: 0</h2>
        <button onclick="startGame()">Tentar Novamente</button>
    </div>

    <div id="victoryScreen" class="overlay">
        <h1>PARABÉNS, VOCÊ VENCEU!</h1>
        <div class="credits">Créditos: Alex</div>
        <button style="background-color: #f1c40f; color: black;" onclick="startGame()">Jogar de Novo</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scoreEl = document.querySelector('#scoreDisplay span');
        const healthBarEl = document.getElementById('healthBar');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const victoryScreen = document.getElementById('victoryScreen');
        const bossWarning = document.getElementById('bossWarning');
        const shootBtn = document.getElementById('shootBtn');

        let player, projectiles, enemies, particles, animationId;
        let score, isGameOver, bossSpawned, titanSpawned;
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

        // Eventos de entrada
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', (e) => { 
            if(!isGameOver && e.target.id !== 'shootBtn') {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
                fire(); 
            }
        });

        // Toque para Mobile (Mira e Atira)
        window.addEventListener('touchstart', (e) => {
            if(isGameOver) return;
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            // Se não tocou no botão, ele apenas mira. Se tocou no botão ou em qualquer lugar, atira.
            fire();
        }, { passive: false });

        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            fire();
        });

        class Player {
            constructor(x, y, radius) {
                this.x = x; this.y = y; this.radius = radius;
                this.health = 100; this.angle = 0;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#3498db'; ctx.fill();
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = '#333'; ctx.fillRect(this.radius, -4, 25, 10);
                ctx.restore();
            }
            update() {
                this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);
                this.draw();
            }
        }

        class Projectile {
            constructor(x, y, velocity) {
                this.x = x; this.y = y; this.velocity = velocity; this.radius = 5;
            }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = '#f1c40f'; ctx.fill(); }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class Enemy {
            constructor(x, y, radius, speed, color = '#2ecc71', hp = 1) {
                this.x = x; this.y = y; this.radius = radius; this.speed = speed;
                this.color = color; this.hp = hp; this.maxHp = hp;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.fillStyle = 'red';
                const eyeOffset = this.radius * 0.3;
                ctx.fillRect(this.x - eyeOffset, this.y - eyeOffset, this.radius * 0.2, this.radius * 0.2);
                ctx.fillRect(this.x + eyeOffset, this.y - eyeOffset, this.radius * 0.2, this.radius * 0.2);
                if (this.maxHp > 1) {
                    ctx.fillStyle = '#000'; ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, this.radius * 2, 6);
                    ctx.fillStyle = this.color === '#ff0000' ? '#f1c40f' : '#e74c3c';
                    ctx.fillRect(this.x - this.radius, this.y - this.radius - 15, (this.radius * 2) * (this.hp / this.maxHp), 6);
                }
            }
            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x; this.y = y; this.color = color; this.velocity = velocity; this.alpha = 1;
            }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); ctx.restore(); }
            update() { this.draw(); this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.02; }
        }

        function init() {
            player = new Player(canvas.width / 2, canvas.height / 2, 18);
            projectiles = []; enemies = []; particles = [];
            score = 0; isGameOver = false; bossSpawned = false; titanSpawned = false;
            bossWarning.style.display = 'none'; victoryScreen.style.display = 'none';
            gameOverScreen.style.display = 'none'; scoreEl.innerHTML = score;
            healthBarEl.style.width = '100%';
        }

        function fire() {
            const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            const velocity = { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 };
            projectiles.push(new Projectile(player.x, player.y, velocity));
        }

        function spawnEnemies() {
            if(isGameOver || bossSpawned || titanSpawned) return;
            const radius = 18;
            let x = Math.random() < 0.5 ? (Math.random() < 0.5 ? -radius : canvas.width + radius) : Math.random() * canvas.width;
            let y = Math.random() < 0.5 ? (Math.random() < 0.5 ? -radius : canvas.height + radius) : Math.random() * canvas.height;
            enemies.push(new Enemy(x, y, radius, 0.8));
            setTimeout(spawnEnemies, score > 5000 ? 500 : 800); 
        }

        function spawnBoss(type) {
            enemies = []; bossWarning.style.display = 'block';
            if (type === 'roxo') {
                bossWarning.style.color = '#8e44ad'; bossWarning.innerHTML = "O ZUMBI GIGANTE ACORDOU!";
                setTimeout(() => bossWarning.style.display = 'none', 3000);
                enemies.push(new Enemy(-100, canvas.height/2, 55, 0.5, '#8e44ad', 38));
            } else {
                bossWarning.style.color = '#ff0000'; bossWarning.innerHTML = "O TITÃ VERMELHO SURGIU!";
                setTimeout(() => bossWarning.style.display = 'none', 4000);
                enemies.push(new Enemy(canvas.width + 100, canvas.height/2, 85, 0.4, '#ff0000', 50));
            }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(26, 26, 26, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            player.update();

            if (score >= 2500 && score < 10000 && !bossSpawned) { bossSpawned = true; spawnBoss('roxo'); }
            if (score >= 10000 && !titanSpawned) { titanSpawned = true; spawnBoss('vermelho'); }

            particles.forEach((p, i) => { if (p.alpha <= 0) particles.splice(i, 1); else p.update(); });
            projectiles.forEach((pr, i) => {
                pr.update();
                if (pr.x < 0 || pr.x > canvas.width || pr.y < 0 || pr.y > canvas.height) projectiles.splice(i, 1);
            });

            enemies.forEach((en, i) => {
                en.update();
                const distPlayer = Math.hypot(player.x - en.x, player.y - en.y);
                if (distPlayer - en.radius - player.radius < 1) {
                    player.health -= (en.maxHp > 1) ? 1.5 : 0.6; 
                    healthBarEl.style.width = player.health + '%';
                    if (player.health <= 0) {
                        isGameOver = true; cancelAnimationFrame(animationId);
                        gameOverScreen.style.display = 'block';
                        finalScoreEl.innerHTML = `Score Final: ${score}`;
                    }
                }

                projectiles.forEach((pr, pri) => {
                    const distProj = Math.hypot(pr.x - en.x, pr.y - en.y);
                    if (distProj - en.radius - pr.radius < 1) {
                        for(let j=0; j<8; j++) particles.push(new Particle(pr.x, pr.y, en.color, {x: (Math.random()-0.5)*5, y: (Math.random()-0.5)*5}));
                        en.hp -= 1;
                        setTimeout(() => projectiles.splice(pri, 1), 0);
                        if (en.hp <= 0) {
                            if (en.color === '#8e44ad') { score += 5000; bossSpawned = false; setTimeout(spawnEnemies, 2000); }
                            else if (en.color === '#ff0000') { score += 15000; scoreEl.innerHTML = score; isGameOver = true; cancelAnimationFrame(animationId); victoryScreen.style.display = 'block'; return; }
                            else { score += 100; }
                            scoreEl.innerHTML = score;
                            setTimeout(() => enemies.splice(i, 1), 0);
                        }
                    }
                });
            });
        }

        function startGame() { init(); animate(); spawnEnemies(); }
        startGame();
    </script>
</body>
</html>
